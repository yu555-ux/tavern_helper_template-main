import { registerMvuSchema } from 'https://testingcf.jsdelivr.net/gh/StageDog/tavern_resource/dist/util/mvu_zod.js';

export const Schema = z.object({
  世界真相: z.object({
    人类的结局: z.object({
      已揭示: z.boolean(),
      描述: z.string(),
      名称: z.string(),
    }),
    世界的状态: z.object({
      已揭示: z.boolean(),
      描述: z.string(),
      名称: z.string(),
    }),
    异常的法则: z.object({
      已揭示: z.boolean(),
      描述: z.string(),
      名称: z.string(),
    }),
    绝望的等级: z.object({
      已揭示: z.boolean(),
      描述: z.string(),
      名称: z.string(),
    }),
  }),
  当前世界: z.object({
    世界名: z.string(),
    世界状态: z.string(),
    世界介绍: z.string(),
  }),
  当前位置: z.object({
    地点名称: z.string(),
    坐标: z.object({
      区域: z.string(),
      层级: z.coerce.number(),
    }),
    地点描述: z.string(),
  }),
  末日进程: z.object({
    进度等级: z.string(),
    当前进度: z.coerce.number(),
    进度描述: z.string(),
  }),
  角色: z.object({
    变异列表: z.record(
      z.string().describe('变异标识'),
      z.object({
        名称: z.string(),
        描述: z.string(),
        效果: z.string(),
      }),
    ),
    故乡: z.string(),
    理智值: z.coerce.number(),
    死亡次数: z.coerce.number(),
    生命值: z.coerce.number(),
    重要之人: z.object({
      姓名: z.string(),
      特征: z.string(),
      关系: z.string(),
    }),
  }),
});

$(() => {
  registerMvuSchema(Schema);
})

