{
  "name": "游戏剧情生成CoT思考模板",
  "description": "用于指导LLM在生成剧情前进行系统化思考，确保输出符合格式规范和逻辑一致性",
  "version": "1.0.0",
  "cot_template": {
    "instruction": "在生成剧情内容之前，请先进行以下系统化思考。将你的思考过程写在 `<thinking>` 和 `</thinking>` 标签中，然后再输出正式的剧情内容。",
    "thinking_steps": {
      "step1_format_check": {
        "title": "第一步：格式规范检查",
        "description": "确认输出格式要求",
        "checklist": [
          "输出顺序：<maintext> → <option> → <sum> → <UpdateVariable>",
          "maintext字数：500-1300字之间（建议800-1000字）",
          "如果涉及经营，maintext必须采用三段式结构（A.玩家选择延续 B.后果总结 C.新剧情推进）",
          "如果只是角色剧情互动，则无结构要求",
          "必须包含所有四个标签，不能缺少任何部分"
        ],
        "thinking_prompt": "请确认：\n1. 本次输出是否需要三段式结构？（判断依据：是否涉及经营、选择、资源变化等）\n2. 目标字数是多少？（建议800-1000字）\n3. 四个标签的顺序是否正确？"
      },
      "step2_scene_analysis": {
        "title": "第二步：场景与角色分析",
        "description": "分析当前场景中的角色和环境",
        "checklist": [
          "当前场景地点：旅店大厅/客房/厨房/其他？",
          "当前时间：{{getvar('stat_data').时间.天数[0]}}天 {{getvar('stat_data').时间.当前时间[0]}}",
          "在场角色列表：",
          "  - 店主：{{getvar('stat_data').店主.身份[0]}}",
          "  - 员工列表：{{getvar('stat_data').员工.员工列表[0]}}（列出所有在场员工及其职务）",
          "  - 客人列表：{{getvar('stat_data').客人.客人列表[0]}}（列出所有在场客人及其基本信息）",
          "每个角色的当前状态：心情、想法、需求等"
        ],
        "thinking_prompt": "请分析：\n1. 当前场景在哪里？环境氛围如何？\n2. 有哪些角色在场？\n3. 每个角色的基本信息（种族、职业、性格特点）\n4. 每个角色的当前状态（心情值、当前想法、需求）\n5. 角色之间的关系如何？"
      },
      "step3_worldview_analysis": {
        "title": "第三步：世界观与客人特点分析",
        "description": "深入分析当前世界的世界观、文化背景和典型客人的特征",
        "checklist": [
          "当前世界：{{getvar('stat_data').旅店.当前世界.世界名[0]}}",
          "世界介绍：{{getvar('stat_data').旅店.当前世界.世界介绍[0]}}",
          "世界观特点：世界的类型、文化背景、社会结构、科技/魔法水平",
          "典型客人类型：这个世界会来什么样的客人？",
          "客人的外形、穿着、生活习惯特点"
        ],
        "thinking_prompt": "请分析：\n1. 当前处于什么世界？世界观特点是什么？（世界类型、文化背景、社会结构、科技/魔法水平、主要种族、世界氛围）\n2. 这个世界会来什么样的客人？（客源类型、典型职业、社会阶层）\n3. 这些客人的特点是什么？（外形特征、穿着风格、生活习惯、行为方式、说话方式、价值观、消费习惯）\n4. 世界观如何影响剧情？（世界氛围如何体现、客人特点如何影响对话和行为、如何展现世界特色）"
      },
      "step4_world_state": {
        "title": "第四步：世界状态与法则影响",
        "description": "分析当前世界状态和旅馆法则对剧情的影响",
        "checklist": [
          "当前旅馆法则：{{getvar('stat_data').旅店.旅馆法则.当前法则[0].法则名}}",
          "法则效果：{{getvar('stat_data').旅店.旅馆法则.当前法则[0].法则效果}}",
          "营业状态：{{getvar('stat_data').旅店.营业状态[0]}}",
          "受欢迎度：{{getvar('stat_data').旅店.受欢迎度[0]}}",
          "入住率：{{getvar('stat_data').旅店.入住率[0]}}%"
        ],
        "thinking_prompt": "请思考：\n1. 当前旅馆法则是什么？法则效果是什么？\n2. **关键**：在场角色会因当前法则受到什么影响？（不同法则对不同类型的角色有不同的影响，要具体分析）\n3. 营业状态如何影响剧情？\n4. 受欢迎度和入住率反映了什么？对剧情有什么影响？\n5. 当前法则如何与世界观相互作用？"
      },
      "step5_resource_state": {
        "title": "第五步：资源与设施状态",
        "description": "分析当前资源状态和设施水平",
        "checklist": [
          "金币：{{getvar('stat_data').资源.金币[0]}}（可用于购买、扩建、支付工资等）",
          "声望：{{getvar('stat_data').资源.声望[0]}}（影响特殊客人和事件触发）",
          "建材：{{getvar('stat_data').资源.建材[0]}}（用于扩建和升级设施）",
          "设施列表：{{getvar('stat_data').设施.设施列表[0]}}",
          "  - 每个设施的名称、等级、当前描述"
        ],
        "thinking_prompt": "请思考：\n1. 当前资源是否充足？是否会影响剧情发展？\n2. 设施水平如何？等级1-5分别代表什么？\n3. 如果玩家进行了扩建/升级操作，设施会如何变化？\n4. 资源状态如何影响角色的行为和对话？"
      },
      "step6_previous_context": {
        "title": "第六步：上一轮剧情回顾",
        "description": "回顾上一轮的剧情和玩家选择",
        "checklist": [
          "上一轮玩家是否做出了选择？选择了哪个选项？",
          "上一轮的主要事件是什么？",
          "上一轮的结果和后果是什么？",
          "本次剧情需要如何承接上一轮？"
        ],
        "thinking_prompt": "请回顾：\n1. 如果上一轮有玩家选择，本次maintext的A部分（玩家选择延续）应该如何描写？\n2. B部分（后果总结）需要总结哪些内容？\n3. 如果上一轮没有玩家选择，本次可以直接进入C部分（新剧情推进）\n4. 如何自然地从上一轮过渡到新剧情？"
      },
      "step7_plot_direction": {
        "title": "第七步：剧情推进方向与故事性",
        "description": "确定本次剧情的推进方向和新的抉择节点，强调故事性和戏剧性",
        "checklist": [
          "本次剧情的主要事件是什么？",
          "需要推进哪些剧情线？",
          "需要引入哪些新元素？（新客人、新事件、新挑战等）",
          "如何让剧情更有故事性和戏剧性？",
          "本次剧情应该以什么新的抉择节点结束？",
          "这个新抉择应该给玩家提供哪些选项？（2-4个）"
        ],
        "thinking_prompt": "请规划：\n1. 本次剧情的主要目标是什么？（推进主线/处理玩家操作/引入新事件等，但要有故事性，不要只是功能性描述）\n2. 剧情应该如何发展？如何让情节更有戏剧性和趣味性？如何通过情节展现角色的魅力？\n3. 需要引入哪些新元素？（新客人要有完整背景和魅力，新事件要有戏剧性，所有新元素要符合轻松有趣的风格）\n4. 如何让剧情更有故事性？（通过角色互动和反应展现事件，让事件有戏剧性和趣味性，能推动角色关系和剧情发展）\n5. 需要哪些对话、行动、环境描写？（对话要生动有趣，行动要具体生动，环境描写要简洁，所有描写要符合轻松有趣的风格）\n6. 本次剧情应该以什么新的抉择节点结束？（抉择要有戏剧性和趣味性，能推动剧情发展）\n7. 这个新抉择应该设计哪些选项？（2-4个选项，每个选项要有不同的后果，要有趣，符合轻喜剧风格）"
      },
      "step8_character_interaction": {
        "title": "第八步：角色互动与魅力塑造",
        "description": "设计角色之间的互动和对话，塑造有趣、有魅力的角色",
        "checklist": [
          "哪些角色之间会有互动？",
          "如何塑造角色的魅力？（有趣、独特、值得探索）",
          "每个角色的对话风格如何？（符合其种族、职业、性格）",
          "角色之间的对话如何推动剧情？",
          "当前法则如何影响角色的行为和对话？",
          "如何通过互动展现角色的个性和故事？"
        ],
        "thinking_prompt": "请设计：\n1. 哪些角色会在本次剧情中出现？（现有角色：店主、员工、客人；新角色：如何引入？）\n2. 如何塑造角色的魅力？（给每个角色有趣、独特的性格特点，让角色有幽默感、智慧或特殊魅力，即使是功能性角色也要有魅力和个性）\n3. 角色之间的互动如何设计？（互动要自然、有趣，符合角色性格，要有戏剧性，能推动剧情发展，符合轻松有趣的文风）\n4. 每个角色的对话风格如何？（考虑种族、职业、性格、当前心情，每个角色要有独特的说话方式，对话要生动有趣，符合轻喜剧风格）\n5. 如果有新角色，如何引入？（新角色要有完整的背景故事、具体的困境或需求、魅力和个性，引入要自然，符合准入条件）\n6. 当前法则如何影响角色的行为和对话？（法则如何影响角色的状态和反应、角色之间的互动，如何通过角色的反应展现法则的影响）\n7. 如何通过互动展现角色的故事？（通过对话展现角色的背景和经历，通过行为展现角色的性格和动机，通过互动展现角色之间的关系和冲突）"
      },
      "step9_writing_style": {
        "title": "第九步：文风与表现力",
        "description": "确定文风和表现手法，要求轻松、有趣、轻喜剧风格",
        "checklist": [
          "叙述人称：第三人称，以\"你\"或\"店主\"称呼玩家",
          "文风基调：轻松、有趣、轻喜剧，但不要脱线",
          "细节描写：注重环境氛围和场景细节",
          "对话风格：符合角色性格，每个角色有独特说话风格，生动有趣",
          "行动描述：具体生动，避免概括性描述",
          "节奏控制：重要情节详细，过渡情节简洁",
          "特殊格式：使用*表示内心想法，**强调重要内容，【事件：...】标注重要信息"
        ],
        "thinking_prompt": "请确认：\n1. 本次剧情的文风基调是什么？（核心要求：轻松、有趣、轻喜剧风格，但不要脱线，保持逻辑性和可信度）\n2. 如何体现轻松有趣的风格？（通过店主的内心独白、角色的有趣反应和对话、轻松的小细节和小插曲，避免过于沉重的描述）\n3. 如何避免脱线？（保持逻辑性和可信度，不要过于夸张或荒诞，角色的行为要符合其身份和背景，幽默要适度）\n4. 哪些地方需要详细描写？哪些地方可以简洁？（重点详细：角色互动、对话、有趣的情节；简洁处理：功能性描述、过渡情节、环境描写）\n5. 如何通过对话展现角色性格？（对话要生动有趣，符合角色性格，每个角色要有独特的说话方式，要能展现角色的魅力和个性）\n6. 如何通过环境描写营造氛围？（环境描写要简洁，重点突出氛围，通过细节营造轻松有趣的氛围）\n7. 哪些地方需要使用特殊格式？（*表示内心想法，**强调重要内容，【事件】标注重要信息，但要适度使用）"
      },
      "step10_length_control": {
        "title": "第十步：字数控制",
        "description": "确保字数符合要求，重点突出角色互动和故事性",
        "checklist": [
          "目标字数：500-1300字（建议800-1000字）",
          "三段式结构字数分配（如果适用）：A部分200-300字，B部分100-200字，C部分400-600字",
          "如果非三段式：整体控制在800-1000字，重点在角色互动和故事",
          "重点突出：角色互动、对话、有趣的情节"
        ],
        "thinking_prompt": "请规划：\n1. 本次maintext的目标字数是多少？（建议800-1000字，保持节奏感，重点突出角色互动和故事）\n2. 如果采用三段式结构，各部分字数如何分配？（A部分200-300字：通过角色互动展现，不要只是功能性描述；B部分100-200字：简洁总结后果；C部分400-600字：重点在角色互动、对话、有趣的情节）\n3. 如果非三段式，字数如何分配？（整体800-1000字，重点：角色互动、对话、有趣的情节约500-700字，环境描写、功能性描述约200-300字）\n4. 如何确保内容丰富但不冗余？（重点突出角色互动和故事性，功能性描述要简洁，避免重复描述，保持节奏感）\n5. 哪些内容可以精简？哪些内容需要详细描写？（可以精简：功能性描述、环境描写、过渡情节；需要详细：角色互动、对话、有趣的情节、角色的反应和故事）"
      },
      "step11_variable_update": {
        "title": "第十一步：变量更新规划",
        "description": "规划需要更新的变量",
        "checklist": [
          "本次剧情中哪些变量会发生变化？",
          "资源变化：金币、声望、建材的增减",
          "时间推进：当前时间的推进",
          "旅店状态：营业状态、受欢迎度、入住率的变化",
          "设施变化：设施列表的更新（升级/新建）",
          "客人变化：客人列表的更新（新增/离开/心情变化）",
          "员工变化：员工列表的更新（新增/解雇/好感度/工作满意度变化）",
          "法则变化：当前法则的切换",
          "特殊事件：当前事件和事件进度的更新"
        ],
        "thinking_prompt": "请规划：\n1. 本次剧情中哪些变量会发生变化？\n2. 每个变量的变化原因是什么？\n3. 变化量是否合理？（符合剧情逻辑，不能过于夸张）\n4. 时间推进是否合理？（不能跳跃过大）\n5. 变量更新必须与剧情内容对应，不能无中生有"
      }
    },
    "output_format": {
      "thinking_tag": {
        "description": "思考过程标签",
        "tags": ["<thinking>", "</thinking>"],
        "required": true,
        "note": "思考过程应该写在thinking标签中，然后再输出正式的剧情内容"
      },
      "thinking_structure": {
        "description": "思考过程的结构建议",
        "sections": [
          "格式规范检查",
          "场景与角色分析",
          "世界观与客人特点分析",
          "世界状态与法则影响",
          "资源与设施状态",
          "上一轮剧情回顾",
          "剧情推进方向",
          "角色互动设计",
          "文风与表现力",
          "字数控制",
          "变量更新规划"
        ],
        "note": "可以按照上述步骤逐一思考，也可以合并相关步骤，但必须覆盖所有关键点"
      }
    },
  }
}
