---
变量更新规则:
  旅店:
    type: |-
      { 
        名称: string;
        风格名称: string;
        风格关键词: string;
        外观描述: string;
        认知修正效果: string;
        当前世界: { 世界名: string; 世界介绍: string; };
        营业状态: '营业中' | '升级中' | '休息中';
        旅馆法则: { 当前法则: { 法则名: string; 法则效果: string; }; 法则列表: Record<string, { 法则效果: string; }>; };
        准入条件: { 当前准入条件: { 模式名称: string; 条件描述: string; }; 准入条件列表: Record<string, { 条件描述: string; }>; };
        受欢迎度: number; 
      }
    description:
      名称: "旅店的名称，在开局创建时设定，通常不会改变"
      风格名称: "旅店的建筑风格名称，在开局创建时设定，通常不会改变。例如：中世纪西方风格、现代简约风格、日式传统风格等"
      风格关键词: "旅店建筑风格的关键词描述，在开局创建时设定，通常不会改变。用于描述风格的特点，例如：西式经典、结实、传统、标准化"
      外观描述: "旅店的外观和内部环境的详细描述，在开局创建时设定，通常不会改变。用于描述旅店的建筑外观、内部布局、装饰风格等视觉特征"
      认知修正效果: "旅店给人们留下的印象和认知，在开局创建时设定，通常不会改变。描述人们对这家旅店的普遍看法和印象，影响客人的初始期望"
      当前世界.世界名: "旅店当前所在的世界名称。可以通过世界旅行功能切换。值：艾尔利亚大陆、霓虹城 2099、苍蓝学园、灰烬废土"
      当前世界.世界介绍: "当前世界的详细描述和特点。当切换世界时，需要更新为对应世界的介绍文本"
      营业状态: "旅店的营业状态。值：营业中、升级中、休息中。当进行扩建或升级时改为'升级中'，不想营业时改为'休息中'，正常营业时改为'营业中'"
      旅馆法则.当前法则: "当前激活的旅馆法则对象，包含'法则名'和'法则效果'两个属性。当切换法则时更新此对象，从'法则列表'中选择对应的法则对象"
      旅馆法则.法则列表: "旅店拥有的法则对象，以法则名为key。每个法则是一个对象，包含'法则效果'属性。当获得新法则时，在对象中添加新的key-value对；对象可以动态扩展"
      准入条件.当前准入条件: "当前激活的准入条件对象，包含'模式名称'和'条件描述'两个属性。当切换准入条件时更新此对象，从'准入条件列表'中选择对应的准入条件对象"
      准入条件.准入条件列表: "旅店拥有的准入条件对象，以模式名称为key。每个准入条件是一个对象，包含'条件描述'属性。当获得新准入条件时，在对象中添加新的key-value对；对象可以动态扩展"
      受欢迎度: "[0,100]之间的整数，代表旅店在客人中的受欢迎程度。0-20为冷淡，21-40为一般，41-60为受欢迎，61-80为很受欢迎，81-100为极受欢迎。根据服务质量、设施水平、客人满意度等因素变化，每次客人满意时+1-5，不满意时-1-3"
    check:
      - 名称在开局创建时设定，通常不会改变，其他都会根据游戏进程而改变。
      - 营业状态在玩家明确指令或剧情需要（如装修、关门）时变更
      - 受欢迎度根据客人评价、服务质量、突发事件结果进行增减（范围0-100）
      - 切换世界时，必须同时更新`当前世界.世界名`和`当前世界.世界介绍`，从值中选择对应的世界信息
      - 切换法则时，必须从`旅馆法则.法则列表`中选取对应的法则对象，更新`当前法则`字段
      - 切换准入条件时，必须从`准入条件.准入条件列表`中选取对应的准入条件对象，更新`当前准入条件`字段
  资源:
    type: |-
      {
        金币: number;
        声望: number;
      }
    description:
      金币: "旅店拥有的金币数量，用于购买物品、扩建设施、支付员工工资等。通过客人消费、完成任务、交易等方式获得，通过购买、扩建、支付等方式消耗。最小值0，无上限"
      声望: "旅店在诸天万界中的声望值，代表旅店的名气和影响力。通过完成特殊任务、接待重要客人、达成成就等方式获得。声望越高，越容易吸引特殊客人和触发特殊事件。最小值0，无上限"
    check:
      - 金币变动：客人消费（+）、支付工资（-）、购买物资（-）、扩建升级（-）
      - 声望变动：完成特殊事件（+）、接待贵宾（+）、恶性事件（-）
      - 必须精确计算数值，不能出现负数（除非特殊剧情允许负债）
  时间:
    type: |-
      {
        天数: number;
        当前时间: string; 
      }
    description:
      天数: "游戏开始后的天数，从1开始计数。每次完成一天的主要经营活动后+1，代表旅店经营的时间流逝"
      当前时间: "当前一天中的时间，格式为hh:mm。根据玩家行动和剧情推进更新，每次行动后根据行动耗时增加相应时间。范围00:00-23:59"
    check:
      - 每次行动（对话、经营、外出）后增加相应时间（如对话+5-15min，外出+1-2h）
      - 时间跨越24:00时，天数+1，当前时间重置为次日时间
      - 保持时间流逝的合理性，避免时间跳跃过大或静止
  设施:
    type: |-
      {
        设施列表: Record<string, {
          名称: string;
          等级: number; 
          当前等级描述: string;
        }>;
      }
    description:
      设施列表: "旅店拥有的设施对象，以设施名称为key。每个设施是一个对象，包含'名称'、'等级'、'当前等级描述'三个属性。名称是设施的名称（如客房、餐饮、调酒、温泉等），等级是[0,5]之间的整数（0为未建造，1-5为不同等级），当前等级描述是对应等级的文字描述。当扩建新设施或升级现有设施时，更新对应设施对象的等级和描述。可以动态新增设施"
    check:
      - 仅在玩家进行"升级"、"扩建"或"修复"操作成功后更新
      - 等级提升时，必须同步更新`当前等级描述`，反映设施外观或功能的变化
      - 新增设施时，在`设施列表`对象中添加新的key-value对
  店主:
    type: |-
      {
        身份: string;
        初始福利: string;
      }
    description:
      身份: "店主的身份和背景。在开局剧情中由 LLM 设定，可以包含种族、职业、经历等信息。例如：人类·退役冒险者、精灵·流浪商人、矮人·铁匠等"
      初始福利: "开局时获得的特殊福利，在开局创建时设定，通常不会改变。值：法则精通、装修基金、忠诚卫士、虚空信标。不同福利提供不同的开局优势"
    check:
      - 通常不变更，除非剧情涉及身份揭秘或更换福利
      - 身份在开局剧情中由 LLM 根据玩家选择和世界观设定
  客人:
    type: |-
      {
        客人列表: Record<string, {
          名称: string;
          种族: string;
          职业名: string;
          职业等级: number;
          外貌描述: string;
          心情值: number; 
          消费金额: number;
          当前想法: string;
        }>;
      }
    description:
      客人列表: "当前在旅店中的客人对象，以客人名称为key。每个客人是一个对象，包含以下属性：'名称'（客人姓名）、'种族'（如人类、精灵、矮人等）、'职业名'（如流浪骑士、巡林客、铁匠等）、'职业等级'（整数，代表职业等级）、'外貌描述'（客人的外貌特征描述）、'心情值'（[0,100]之间的整数，代表客人当前的心情）、'消费金额'（客人本次消费的金币数，整数，最小值0）、'当前想法'（客人当前的想法或需求描述）。当有新客人入住时，在对象中添加新的key-value对；当客人离开时，从对象中移除对应key。可以动态扩展"
    check:
      - 新客人进入：添加新键值对，初始化所有字段，key为客人名称
      - 客人离开：移除对应键值对（op: remove）
      - 互动/事件：更新`心情值`、`当前想法`、`消费金额`
      - 心情值受服务、环境、对话影响
  员工:
    type: |-
      {
        员工列表: Record<string, {
          名称: string;
          种族: string;
          职业?: string; 
          战斗职业名?: string; 
          旅馆担任的职务?: string; 
          职业等级: number;
          外貌描述: string;
          心情值?: number; 
          对玩家的好感度?: number; 
          工作满意度?: number;
          喜好?: string[]; 
          厌恶?: string[]; 
          工资: number;
          当前想法: string;
        }>;
      }
    description:
      员工列表: "当前在旅店中的员工对象，以员工名称为key。每个员工是一个对象，包含以下属性：'名称'（员工姓名）、'种族'（如人类、精灵、矮人等）、'职业'或'旅馆担任的职务'（如服务员、厨师、调酒师、见习杂役等，表示员工在旅店中的职务）、'战斗职业名'（如法师、战士、盗贼等，表示员工的战斗职业）、'职业等级'（整数，代表职业等级）、'外貌描述'（员工的外貌特征描述）、'心情值'（[0,100]之间的整数，代表员工当前的心情）、'对玩家的好感度'（[0,100]之间的整数，代表员工对店主的好感）、'工作满意度'（[0,100]之间的整数，代表员工对今天工作环境的满意度，根据工作强度、待遇、工作环境等因素变化）、'喜好'（字符串数组，包含员工喜欢的事物，可以有多个标签）、'厌恶'（字符串数组，包含员工厌恶的事物，可以有多个标签）、'工资'（员工每月的工资，整数，最小值0）、'当前想法'（员工当前的想法或需求描述）。当有新员工入职时，在对象中添加新的key-value对；当员工离职时，从对象中移除对应key。可以动态扩展"
    check:
      - 招募/解雇时增删条目，key为员工名称
      - 定期（如每日结算）更新心情值、工作满意度，受工作强度、薪资满意度影响
      - 互动/事件后更新`对玩家的好感度`、`心情值`、`当前想法`
      - 至少需要提供'职业'或'旅馆担任的职务'中的一个，表示员工在旅店中的职务
  特殊事件:
    type: |-
      {
        当前事件: string;
        事件进度: number;
      }
    description:
      当前事件: "当前正在进行的特殊事件名称。空字符串表示没有特殊事件。当触发特殊事件时更新为事件名称，事件结束时重置为空字符串"
      事件进度: "[0,100]之间的整数，代表当前特殊事件的完成进度。0为未开始，100为完成。根据事件类型和玩家行动更新"
    check:
      - 触发新事件时设置`当前事件`名，进度归0
      - 事件推进时更新进度，达到100或剧情结束时清空`当前事件`
  