            "name": "玩家上轮选择的延续",
            "description": "如果上一轮玩家做出了选择（调查、观察、行动、休息等），必须首先描述玩家选择的具体行动和对应的剧情延续。要通过环境反应、感官体验、心理变化来展现，不要只是功能性描述",
