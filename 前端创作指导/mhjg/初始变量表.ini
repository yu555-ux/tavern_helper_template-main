{
  "name": "游戏开局剧情生成CoT思考模板",
  "description": "专门用于生成开局介绍剧情，区别于正式游戏中的CoT模板。开局剧情需要详细介绍旅店特性、世界观、初始状态等，不需要承接上一轮剧情。",
  "version": "1.0.0",
  "cot_template": {
    "instruction": "在生成开局剧情内容之前，请先进行以下系统化思考。将你的思考过程写在 `<thinking>` 和 `</thinking>` 标签中，然后再输出正式的开局剧情内容。",
    "thinking_steps": {
      "step1_format_check": {
        "title": "第一步：格式规范检查",
        "description": "确认开局输出格式要求",
        "checklist": [
          "输出顺序：<maintext> → <option> → <sum>",
          "maintext字数：800-1500字之间（建议1000-1200字，开局介绍可以稍长）",
          "开局剧情不需要三段式结构，直接是介绍性文本",
          "必须包含 <maintext>、<option>、<sum> 三个标签",
          "不需要 <UpdateVariable> 标签（开局是初始化，不是更新）"
        ],
        "thinking_prompt": "请确认：\n1. 开局剧情不需要三段式结构，直接是介绍性文本\n2. 目标字数是多少？（建议1000-1200字，可以稍长以充分介绍）\n3. 三个标签的顺序是否正确？（maintext → option → sum）\n4. 不需要 UpdateVariable 标签"
      },
      "step2_opening_setting": {
        "title": "第二步：开局设定确认",
        "description": "确认开局的基本设定信息",
        "checklist": [
          "旅店名称：{{getvar('stat_data').旅店.旅店名[0]}}",
          "旅店风格：{{getvar('stat_data').旅店.旅店风格[0]}}",
          "当前世界：{{getvar('stat_data').旅店.当前世界.世界名[0]}}",
          "世界介绍：{{getvar('stat_data').旅店.当前世界.世界介绍[0]}}",
          "开局福利：{{getvar('stat_data').旅店.开局福利[0]}}",
          "准入条件：{{getvar('stat_data').旅店.准入条件[0]}}",
          "店主身份：{{getvar('stat_data').店主.身份[0]}}"
        ],
        "thinking_prompt": "请确认：\n1. 旅店的基本信息是什么？（名称、风格、位置）\n2. 当前处于什么世界？这个世界有什么特点？\n3. 店主是什么身份？有什么背景？\n4. 开局福利是什么？如何体现？\n5. 准入条件是什么？如何影响后续剧情？"
      },
      "step3_worldview_introduction": {
        "title": "第三步：世界观详细介绍",
        "description": "深入介绍当前世界的世界观、文化背景和特色",
        "checklist": [
          "当前世界：{{getvar('stat_data').旅店.当前世界.世界名[0]}}",
          "世界介绍：{{getvar('stat_data').旅店.当前世界.世界介绍[0]}}",
          "世界观特点：世界的类型、文化背景、社会结构、科技/魔法水平、主要种族、世界氛围",
          "典型客人类型：这个世界会来什么样的客人？",
          "世界特色：这个世界有什么独特之处？"
        ],
        "thinking_prompt": "请分析：\n1. 当前处于什么世界？世界观特点是什么？（世界类型、文化背景、社会结构、科技/魔法水平、主要种族、世界氛围）\n2. 这个世界会来什么样的客人？（客源类型、典型职业、社会阶层）\n3. 这个世界的特色是什么？（独特的文化、习俗、传统、特殊的规则、法则、现象，如何通过描写展现世界特色）"
      },
      "step4_inn_properties": {
        "title": "第四步：旅店特性说明",
        "description": "详细介绍旅店的三个不可改变的特性",
        "checklist": [
          "特性一：旅店不可被毁灭（建筑部分）",
          "特性二：旅店可以穿越诸天万界",
          "特性三：旅店内自带法则（由店主掌控）",
          "如何自然地介绍这些特性？",
          "如何让玩家理解这些特性的重要性？"
        ],
        "thinking_prompt": "请思考：\n1. 旅店的三个不可改变的特性是什么？（特性一：旅店不可被毁灭；特性二：旅店可以穿越诸天万界；特性三：旅店内自带法则）\n2. 如何自然地介绍这些特性？（不要生硬列举，要融入剧情描述，可以通过店主的内心独白、环境描写、神秘力量的展现来介绍）\n3. 如何让玩家理解这些特性的重要性？（说明这些特性如何影响后续经营和剧情发展，让玩家感受到作为店主的特殊地位）"
      },
      "step5_initial_state": {
        "title": "第五步：初始状态与开局福利",
        "description": "介绍旅店的初始状态和资源，重点体现开局福利",
        "checklist": [
          "初始资源：金币{{getvar('stat_data').资源.金币[0]}}、声望{{getvar('stat_data').资源.声望[0]}}、建材{{getvar('stat_data').资源.建材[0]}}",
          "初始设施：{{getvar('stat_data').设施.设施列表[0]}}",
          "初始员工：{{getvar('stat_data').员工.员工列表[0]}}（如果有开局福利）",
          "初始法则：{{getvar('stat_data').旅店.旅馆法则.当前法则[0].法则名}}",
          "营业状态：{{getvar('stat_data').旅店.营业状态[0]}}",
          "开局福利：{{getvar('stat_data').旅店.开局福利[0]}}，如何在剧情中体现？"
        ],
        "thinking_prompt": "请思考：\n1. 旅店的初始资源、设施、员工、法则、营业状态是什么？\n2. 开局福利是什么？如何在剧情中体现？（装修基金：交待初始资金的增加；忠诚卫士：塑造全能能干的管家/员工，要有魅力、有能力；法则精通：体现店主对法则的掌控能力；虚空信标：体现旅店的特殊吸引力）"
      },
      "step6_inn_environment": {
        "title": "第六步：旅店环境描写",
        "description": "详细描写旅店的环境、氛围和细节",
        "checklist": [
          "旅店外观：根据旅店风格{{getvar('stat_data').旅店.旅店风格[0]}}描写外观",
          "旅店内部：大厅、客房、厨房等区域的描写",
          "环境氛围：如何营造氛围？如何体现旅店的"庇护所"特性？",
          "细节描写：炉火、装饰、家具、气味、光线等"
        ],
        "thinking_prompt": "请设计：\n1. 旅店的外观是什么样的？（根据旅店风格描写，体现旅店特色，与当前世界融合）\n2. 旅店内部是什么样的？（大厅、客房、厨房等区域的空间、装饰、氛围、状态）\n3. 环境氛围如何？（如何通过环境描写营造氛围，如何体现旅店的"庇护所"特性）\n4. 有哪些细节描写？（炉火、装饰、家具、气味、光线等，要简洁，重点突出氛围）"
      },
      "step7_owner_introduction": {
        "title": "第七步：店主身份介绍",
        "description": "介绍店主的身份、背景和当前状态",
        "checklist": [
          "店主身份：{{getvar('stat_data').店主.身份[0]}}",
          "店主背景：如何成为店主的？",
          "店主当前状态：心情、想法、目标",
          "店主与旅店的关系：如何感受旅店？"
        ],
        "thinking_prompt": "请设计：\n1. 店主是什么身份？这个身份有什么特点？如何影响店主的思维和行为？\n2. 店主如何成为店主的？（是否签订了灵魂契约？有什么特殊经历？有什么使命或目标？）\n3. 店主当前状态如何？（心情、想法、目标）\n4. 店主如何感受旅店？（是否感受到旅店的神秘力量、温暖、作为店主的责任？）"
      },
      "step8_access_mode_guest": {
        "title": "第八步：准入条件与第一个客人",
        "description": "根据准入条件设计第一个客人的状态、故事和人格魅力",
        "checklist": [
          "当前准入条件：{{getvar('stat_data').旅店.准入条件.当前准入条件[0].模式名称}}",
          "准入条件描述：{{getvar('stat_data').旅店.准入条件.当前准入条件[0].条件描述}}",
          "第一个客人的状态：根据准入条件确定客人的状态",
          "客人的背景故事：可信的人生经历",
          "客人的人格魅力：有趣、有魅力的性格特点",
          "客人的当前困境：根据准入条件设计"
        ],
        "thinking_prompt": "请思考：\n1. 当前准入条件是什么？准入条件描述是什么？\n2. 准入条件如何影响第一个客人的状态？（实体显现：普通旅人，状态正常；绝境救赎：极度绝望、濒死或强烈祈求；抉择时刻：面临人生巨大分岔道路的抉择，处于彷徨/举棋不定/迷茫状态；命运节点：身负大气运者或剧情关键角色）\n3. 如何塑造客人的可信人生？（完整的背景故事、具体的人生轨迹和动机、困境和状态符合准入条件要求）\n4. 如何塑造客人的人格魅力？（有趣、独特的性格特点，有幽默感、智慧或特殊魅力，通过对话和行为展现个性，值得探索和互动）\n5. 客人的当前困境是什么？（根据准入条件设计，要具体、可信、有戏剧性，能引发玩家兴趣和同情，能自然引出后续剧情）"
      },
      "step9_opening_plot": {
        "title": "第九步：开局剧情设计",
        "description": "设计开局剧情的推进，引入第一个客人，并设计第一个抉择节点",
        "checklist": [
          "开局剧情的主要目标：介绍旅店、设定世界观、引入第一个客人",
          "剧情推进：如何从介绍过渡到第一个客人的出现？",
          "第一个客人的出现：如何自然地引入客人？",
          "客人与店主的互动：如何展现客人的魅力和困境？",
          "第一个抉择节点：应该给玩家提供什么选择？（2-4个选项）"
        ],
        "thinking_prompt": "请规划：\n1. 开局剧情的主要目标是什么？（介绍旅店和特性要简洁，设定世界观要融入剧情，重点：引入第一个客人，展现客人的魅力和困境）\n2. 剧情应该如何推进？（从店主视角开始，简洁介绍旅店和世界，介绍旅店特性要融入剧情，关键：第一个客人出现，展现客人的状态和困境，客人与店主的互动，自然过渡到第一个抉择）\n3. 第一个客人如何出现？（根据准入条件，客人如何"找到"旅店？出现要自然、有戏剧性，状态要符合准入条件要求，要引发玩家兴趣）\n4. 客人与店主的互动如何设计？（通过对话展现客人的性格和困境，通过行为展现客人的状态和需求，让玩家感受到客人的魅力和值得探索，互动要有趣、轻松，符合轻喜剧风格）\n5. 第一个抉择节点应该是什么？（给玩家提供什么选择？选项应该涉及什么？如何让玩家感受到选择的自由度？选项要能引导玩家进入游戏，感受旅店的特色）"
      },
      "step10_writing_style": {
        "title": "第十步：文风与表现力",
        "description": "确定开局文风和表现手法，要求轻松、有趣、轻喜剧风格",
        "checklist": [
          "叙述人称：第三人称，以\"你\"或\"店主\"称呼玩家",
          "文风基调：轻松、有趣、轻喜剧，但不要脱线",
          "细节描写：注重环境氛围和场景细节",
          "节奏控制：开局介绍要简洁，重点在第一个客人的故事",
          "特殊格式：使用*表示内心想法，**强调重要内容"
        ],
        "thinking_prompt": "请确认：\n1. 开局剧情的文风基调是什么？（核心要求：轻松、有趣、轻喜剧风格，但不要脱线，保持逻辑性和可信度）\n2. 如何体现轻松有趣的风格？（通过店主的内心独白、客人的有趣反应和对话、轻松的小细节和小插曲，避免过于沉重的描述）\n3. 如何避免脱线？（保持逻辑性和可信度，不要过于夸张或荒诞，角色的行为要符合其身份和背景，幽默要适度）\n4. 哪些地方需要详细描写？（重点：第一个客人的状态、困境和魅力，客人与店主的互动；简洁：旅店的环境和氛围，当前世界的特色）\n5. 如何通过描写营造氛围？（环境描写要简洁，细节描写要有趣，内心独白要轻松有趣，对话要生动有趣）\n6. 哪些地方需要使用特殊格式？（*表示内心想法，**强调重要内容，但要适度使用）"
      },
      "step11_length_control": {
        "title": "第十一步：字数控制",
        "description": "确保开局字数符合要求，重点在第一个客人的故事",
        "checklist": [
          "目标字数：800-1500字（建议1000-1200字）",
          "开局介绍要简洁，重点在第一个客人的故事",
          "各部分字数分配：世界观和旅店介绍200-300字，旅店特性100-200字，环境描写100-200字，店主介绍50-100字，开局福利50-100字，第一个客人的故事400-600字，过渡到第一个抉择100-200字"
        ],
        "thinking_prompt": "请规划：\n1. 开局maintext的目标字数是多少？（建议1000-1200字，可以稍长以充分展现第一个客人的故事，但要避免冗长，保持节奏感）\n2. 各部分字数如何分配？（世界观和旅店介绍200-300字，旅店特性100-200字，环境描写100-200字，店主介绍50-100字，开局福利50-100字，第一个客人的出现和故事400-600字，过渡到第一个抉择100-200字）\n3. 如何确保内容丰富但不冗余？（重点突出第一个客人的故事和魅力，旅店介绍要简洁，不要重复描述，保持节奏感，通过客人的故事来展现旅店的特色）"
      },
      "step12_summary_design": {
        "title": "第十二步：总结设计",
        "description": "设计 <sum> 标签的内容",
        "checklist": [
          "<sum> 标签的作用：用于编年史记录",
          "总结内容：简洁概括开局剧情和第一个客人",
          "总结格式：一句话或几句话",
          "总结重点：店主的身份、旅店的基本情况、当前世界、第一个客人的出现"
        ],
        "thinking_prompt": "请设计：\n1. <sum> 标签的内容应该是什么？（用于编年史记录，简洁概括开局剧情，格式：一句话或几句话，重点：店主的身份、旅店的基本情况、当前世界、第一个客人的出现）\n2. 总结应该如何写？（简洁明了，突出关键信息，符合编年史的记录风格，可以提及第一个客人的出现，但不要过于详细）"
      }
    },
    "output_format": {
      "thinking_tag": {
        "description": "思考过程标签",
        "tags": ["<thinking>", "</thinking>"],
        "required": true,
        "note": "思考过程应该写在thinking标签中，然后再输出正式的开局剧情内容"
      },
      "thinking_structure": {
        "description": "思考过程的结构建议",
        "sections": [
          "格式规范检查",
          "开局设定确认",
          "世界观详细介绍",
          "旅店特性说明",
          "初始状态与开局福利",
          "旅店环境描写",
          "店主身份介绍",
          "准入条件与第一个客人",
          "开局剧情设计",
          "文风与表现力",
          "字数控制",
          "总结设计"
        ],
        "note": "可以按照上述步骤逐一思考，也可以合并相关步骤，但必须覆盖所有关键点"
      }
    },
  }
}

